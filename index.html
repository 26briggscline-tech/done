<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
        #pong {
            border: 2px solid white;
            width: 600px;
            height: 400px;
            position: relative;
        }
        .paddle {
            position: absolute;
            background-color: white;
            width: 10px;
            height: 60px;
        }
        .ball {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            width: 10px;
            height: 10px;
        }
    </style>
</head>
<body>
    <div id="pong">
        <div class="paddle" id="left-paddle" style="left: 0;"></div>
        <div class="paddle" id="right-paddle" style="right: 0;"></div>
        <div class="ball" id="ball" style="left: 295px; top: 195px;"></div>
    </div>
    <script>
        // Game logic goes here
    </script>
</body>
</html>
